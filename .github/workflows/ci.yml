name: CI

on:
  push:
    branches: [ main, "feature/*", "hotfix/*" ]
  pull_request:
    branches: [ main, "feature/*", "hotfix/*" ]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          CLERK_SECRET_KEY: sk_test_dummy
          NEXT_PUBLIC_CONVEX_URL: https://dummy.convex.cloud
          CLERK_JWT_ISSUER_DOMAIN: https://dummy.clerk.accounts.dev
          NOTION_API_KEY: ntn_dummy
          NOTION_POSTS_DATA_SOURCE_ID: dummy
          NOTION_COMMENTS_DATA_SOURCE_ID: dummy
          GA_ID: G-DUMMY
          GOOGLE_ADSENSE_ID: pub-dummy
          GOOGLE_ADSENSE_ACCOUNT: pub-dummy
          GTM_ID: GTM-DUMMY
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
